version: "1.1.5"

cache: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4.6"
          - "google/gemini-2.5-pro"
          - "openai/gpt-5"
          - "google/gemma-4-31b-it:free"
        fetch: true
      titleConvo: true
      modelDisplayLabel: "OpenRouter"
      dropParams: ["stop"]

interface:
  codeExecution: true
  htmlArtifacts: true
  reactArtifacts: true

fileStrategies:
  avatar: "local"
  image: "local"
  document: "s3"
