version: 1.2.8
cache: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4.6"
          - "google/gemini-2.5-pro"
          - "openai/gpt-5"
        fetch: false
      titleConvo: true
      titleModel: "current_model"
      modelDisplayLabel: "OpenRouter"

fileStrategies:
  avatar: "local"
  image: "local"
  document: "s3"
