version: "1.1.5"
cache: true

endpoints:
  agents:
    recursionLimit: 25

interface:
  codeExecution: true
  htmlArtifacts: true
  reactArtifacts: true

fileStrategies:
  avatar: "s3"
  image: "s3"
  document: "s3"

webSearch:
  searchProvider: tavily
  scraperProvider: tavily
  tavilyApiKey: "${TAVILY_API_KEY}"
  rerankerType: "none"
