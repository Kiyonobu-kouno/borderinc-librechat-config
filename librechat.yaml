version: "1.1.5"
cache: true

endpoints:
  agents:
    recursionLimit: 25
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 5
  validKeys:
    - 'project_context'
    - 'user_preferences'
  agent:
    provider: 'anthropic'
    model: 'claude-3-5-haiku-20241022'
    instructions: >
      Store only objective facts about the BORDER project
      (tech stack, domain configuration, tool decisions) and
      Kiyonobu's technical preferences. Do not store tone,
      personality directives, or conversational style notes
      belonging to any specific agent persona.

interface:
  codeExecution: true
  htmlArtifacts: true
  reactArtifacts: true

fileStrategies:
  avatar: "s3"
  image: "s3"
  document: "s3"

webSearch:
  searchProvider: tavily
  scraperProvider: tavily
  tavilyApiKey: "${TAVILY_API_KEY}"
  rerankerType: "none"
