version: "1.1.5"
cache: true

endpoints:
  agents:
    recursionLimit: 25

interface:
  codeExecution: true
  htmlArtifacts: true
  reactArtifacts: true

webSearch:
  searchProvider: tavily
  scraperProvider: tavily
  tavilyApiKey: "${TAVILY_API_KEY}"
  rerankerType: "none"

memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 5
  validKeys:
    - 'user_preferences'
  agent:
    provider: 'anthropic'
    model: 'claude-haiku-4-5-20251001'
    enabled: true
    instructions: >
      Store only Kiyonobu's personal preferences, working style,
      and communication preferences. Do not store project-specific
      technical details (tech stack, infrastructure, storage config,
      tool decisions, cost figures) as these become outdated quickly.
      Do not store tone, personality directives, or conversational
      style notes belonging to any specific agent persona.
